<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notaris{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="/" class="logo-link"><h1>Notaris</h1></a>
            <nav>
                <a href="/notes/batch">Input Notes</a>
                <a href="/schema/new">Schema</a>
                <a href="/extraction/provider">Provider</a>
                <a href="/extraction/results">Results</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% if errors %}
            <div class="error">
                <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
                </ul>
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
